<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Task Manager</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <div class="header-top">
                <h1>📝 Student Task Manager</h1>
                <button id="theme-toggle" class="btn-toggle">Light Mode</button>
            </div>
            <div class="datetime-container">
                <p id="current-date">-- ---- ----</p>
                <p id="current-time">00:00:00 AM</p>
            </div>
        </header>

        <section class="form-section">
            <form id="task-form">
                <input type="text" id="task-name" placeholder="Task Name (e.g., Practice JS)" required>
                <input type="text" id="task-subject" placeholder="Subject (e.g., Web Dev)" required>
                <select id="task-priority">
                    <option value="High">High</option>
                    <option value="Medium" selected>Medium</option>
                    <option value="Low">Low</option>
                </select>
                <button type="submit" class="btn-add">Add Task</button>
            </form>
        </section>

        <section class="controls-section">
            <div class="stats-container">
                <span class="stat-badge">Total: <strong id="total-count">0</strong></span>
                <span class="stat-badge completed">Completed: <strong id="completed-count">0</strong></span>
                <span class="stat-badge pending">Pending: <strong id="pending-count">0</strong></span>
            </div>
            <div class="filter-buttons">
                <button class="btn-filter active" data-filter="all">All</button>
                <button class="btn-filter" data-filter="pending">Pending</button>
                <button class="btn-filter" data-filter="completed">Completed</button>
            </div>
        </section>

        <main>
            <ul id="task-list" class="task-list">
                </ul>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
